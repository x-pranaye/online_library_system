<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LibroZone</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-left">
            <div class="auth-brand">
                <i class="fas fa-book-open"></i>
                <h1>LibroZone</h1>
            </div>
            <div class="auth-features">
                <div class="auth-feature">
                    <i class="fas fa-check-circle"></i>
                    <span>Access 50,000+ books</span>
                </div>
                <div class="auth-feature">
                    <i class="fas fa-check-circle"></i>
                    <span>Read offline anytime</span>
                </div>
                <div class="auth-feature">
                    <i class="fas fa-check-circle"></i>
                    <span>Personal recommendations</span>
                </div>
            </div>
            <div class="auth-illustration">
                <div class="floating-icons">
                    <i class="fas fa-book"></i>
                    <i class="fas fa-bookmark"></i>
                    <i class="fas fa-glasses"></i>
                </div>
            </div>
        </div>
        <div class="auth-right">
            <div class="auth-box">
                <h2>Welcome Back! 👋</h2>
                <p>Sign in to continue your reading journey</p>
                
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <div class="password-input">
                            <input type="password" id="password" placeholder="Enter your password" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                        </div>
                    </div>
                    <div class="form-options">
                        <label class="checkbox">
                            <input type="checkbox" id="remember">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>

                <div class="social-login">
                    <p>Or continue with</p>
                    <div class="social-buttons">
                        <button class="btn btn-social google">
                            <i class="fab fa-google"></i> Google
                        </button>
                        <button class="btn btn-social facebook">
                            <i class="fab fa-facebook-f"></i> Facebook
                        </button>
                    </div>
                </div>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="register.html">Register Now</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
